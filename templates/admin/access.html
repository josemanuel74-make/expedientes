{% extends "base.html" %}
{% block content %}
<header class="page-header">
  <div>
    <h2>Administradores</h2>
    <p class="muted">Correos con acceso total a la aplicación.</p>
  </div>
</header>

<section class="panel">
  <form method="post" action="{{ url_for('main.admin_access_add') }}" class="form-grid compact">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>
      Correo del administrador
      <input type="email" name="email" required placeholder="nombre@edumelilla.es">
    </label>
    <div class="actions">
      <button class="button" type="submit">Añadir administrador</button>
    </div>
  </form>
</section>

<section class="panel">
  <div class="table-wrap">
    <table class="table">
      <thead>
        <tr>
          <th>Correo</th>
          <th>Nombre</th>
          <th>Alta</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        {% for item in admin_emails %}
        <tr>
          <td data-label="Correo">{{ item.email }}</td>
          <td data-label="Nombre">{{ item.display_name or 'Pendiente' }}</td>
          <td data-label="Alta">{{ item.created_at }}</td>
          <td data-label="Acciones">
            <form
              method="post"
              action="{{ url_for('main.admin_access_delete', email=item.email) }}"
              data-confirm="true"
              data-confirm-title="¿Eliminar administrador?"
              data-confirm-message="Se retirará el acceso total a {{ item.email }}. Esta persona dejará de poder entrar como administrador."
              data-confirm-submit="Eliminar administrador"
            >
              <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
              <button class="link-button link-danger" type="submit">Eliminar</button>
            </form>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</section>
{% endblock %}
